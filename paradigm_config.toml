# ============================================================================
# SEEG 脑机接口范式参数配置（paradigm_config.toml）
#
# 用法：
#   python -m seeg_task.run --config paradigm_config.toml
#   （不带 --config 时，若仓库根目录存在 paradigm_config.toml 会自动加载）
#
# 优先级：默认值 < 本文件 < 命令行参数（如 --source/--blocks 会覆盖此处）
# 未列出的字段沿用 ExperimentConfig 的默认值；写错的字段名会被忽略并告警。
# ============================================================================

# ---- block / trial 结构 ----------------------------------------------------
n_blocks = 4                 # block 数
trials_per_block = 8         # 每个 block 的试次数

# ---- 各阶段时长（秒）-------------------------------------------------------
cue_duration = 2.0           # CUE：全屏「当前动作为：{}」提示时长
fixation_duration = 1.0      # FIXATION：盯点（白色十字）时长
execute_duration = 4.0       # EXECUTE：执行/采集阶段持续时长，到点进 FINISH
iti_duration = 3.0           # trial 间隔（仅 trial 之间，最后一个 trial 后不做）；0=无间隔
predict_interval = 0.4       # EXECUTE 内每隔多少秒做一次 predict（实时滚动解码）
# 注：block 间休息无倒计时——先更新模型，再按空格进入下一 block

# ---- 信号参数 --------------------------------------------------------------
n_channels = 16              # 通道数
sampling_rate = 4096       # 采样率 (Hz)
window_samples = 8192        # 单个解码窗口的采样点数 -> x.shape=(n_channels, window_samples)

# ---- 信号源选择 ------------------------------------------------------------
source_type = "synthetic"    # "lsl" | "dummy" | "synthetic"
# 仅 source_type = "lsl" 时使用：
# lsl_stream_name = "MockSEEG"   # 按流名解析（取消注释以启用）
lsl_stream_type = "EEG"          # 按流类型解析（lsl_stream_name 为空时生效）
lsl_resolve_timeout = 5.0        # 解析 LSL 流的超时（秒）

# ---- 解码器 ----------------------------------------------------------------
# 在范式中运行的解码器（完整导入路径）。只要实例具备 predict / update 即可（鸭子类型）；
# 有 from_config 则用之，否则按 cls(n_classes) 构造。
# 未给定（注释掉）时默认 DummyDecoder（随机概率、不训练）。
decoder_class = "models.model_1.model.LogisticBandPowerDecoder"
#   备选：decoder_class = "seeg_task.decoder.Decoder"   # 内置线性模型 + 在线训练
# 传给解码器 from_config 的额外参数见文件末尾可选的 [decoder_params] 表。

# ---- 显示 ------------------------------------------------------------------
fullscreen = true
window_size = [1280, 720]
background_color = [-0.2, -0.2, -0.2]   # PsychoPy rgb，范围 [-1, 1]
text_color = [1.0, 1.0, 1.0]
# 中文字体：按顺序尝试，取第一个系统可用的
font_candidates = ["PingFang SC", "Heiti SC", "STHeiti", "Arial Unicode MS", "SimHei"]

# ---- 日志 ------------------------------------------------------------------
log_level = "INFO"           # DEBUG/INFO/WARNING/ERROR；predict 与 update 在 INFO 级别写日志
# log_file = "logs/run.log"  # 取消注释则同时写入文件（相对路径相对本配置文件目录）

# ---- 杂项 ------------------------------------------------------------------
random_seed = 0              # 可复现种子；填负数（如 -1）表示不固定种子

# ---- 动作类别（解码类别数 = 动作数）---------------------------------------
# 每个元素为屏幕显示的动作名（中文）。
actions = ["右手握拳","张嘴","舌头顶上颚"]

# ---- 解码器额外参数（可选，透传给 decoder_class.from_config）---------------
# 必须置于文件末尾（TOML 表头之后的键都归属该表）。默认空表。
# 示例：
# [decoder_params]
# checkpoint = "models/my_decoder.pt"
# device = "cuda"

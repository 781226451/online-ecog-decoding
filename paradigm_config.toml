# ============================================================================
# SEEG 脑机接口范式参数配置（paradigm_config.toml）
#
# 用法：
#   python -m seeg_task.run --config paradigm_config.toml
#   （不带 --config 时，若仓库根目录存在 paradigm_config.toml 会自动加载）
#
# 优先级：默认值 < 本文件 < 命令行参数（如 --source/--blocks 会覆盖此处）
# 未列出的字段沿用 ExperimentConfig 的默认值；写错的字段名会被忽略并告警。
# ============================================================================

# ---- block / trial 结构 ----------------------------------------------------
n_blocks = 4                 # block 数
trials_per_block = 8         # 每个 block 的试次数

# ---- 各阶段时长（秒）-------------------------------------------------------
fixation_duration = 1.0      # 注视点 / 准备
cue_duration = 4.0           # 动作执行/想象 + 采集 + 解码
feedback_duration = 1.0      # 结果反馈停留
rest_duration = 15.0         # block 间休息（期间后台训练）
predict_interval = 0.5       # cue 采集期内每隔多少秒在主线程做一次 predict（实时滚动解码）

# ---- 信号参数 --------------------------------------------------------------
n_channels = 64              # 通道数
sampling_rate = 1000.0       # 采样率 (Hz)
window_samples = 2000        # 单个解码窗口的采样点数 -> x.shape=(n_channels, window_samples)

# ---- 信号源选择 ------------------------------------------------------------
source_type = "synthetic"    # "lsl" | "dummy" | "synthetic"
# 仅 source_type = "lsl" 时使用：
# lsl_stream_name = "MockSEEG"   # 按流名解析（取消注释以启用）
lsl_stream_type = "EEG"          # 按流类型解析（lsl_stream_name 为空时生效）
lsl_resolve_timeout = 5.0        # 解析 LSL 流的超时（秒）

# ---- 解码器 ----------------------------------------------------------------
# 在范式中运行的解码器子类（完整导入路径，须为 BaseDecoder 子类并实现 from_config）。
# 未给定（保持下面一行注释）时，默认使用 DummyDecoder（随机概率、不训练，无模型联调）。
# 需要真实/自定义解码器时取消注释并指定，例如：
#   decoder_class = "seeg_task.decoder.Decoder"     线性模型 + 在线训练
#   decoder_class = "mypkg.mymodule.MyDecoder"       自定义
# decoder_class = "seeg_task.decoder.Decoder"
# 传给解码器 from_config 的额外参数见文件末尾可选的 [decoder_params] 表。

# ---- 在线模型更新 ----------------------------------------------------------
history_size = 256           # 历史样本缓冲容量（最多保留多少 (x,label) 样本）
train_n_samples = 64         # 每个 block 后送入训练的历史样本数 n（不应大于 history_size）

# ---- 显示 ------------------------------------------------------------------
fullscreen = false
window_size = [1280, 720]
background_color = [-0.2, -0.2, -0.2]   # PsychoPy rgb，范围 [-1, 1]
text_color = [1.0, 1.0, 1.0]
# 中文字体：按顺序尝试，取第一个系统可用的
font_candidates = ["PingFang SC", "Heiti SC", "STHeiti", "Arial Unicode MS", "SimHei"]

# ---- 媒体素材 --------------------------------------------------------------
show_media = false           # 暂时屏蔽 gif/视频，左侧仅用文字表述动作（改 true 恢复）
media_dir = "media"          # 相对路径相对本配置文件所在目录解析
gif_frame_duration = 0.05    # gif 缺少帧时长信息时的回退帧间隔（秒）

# ---- 日志 ------------------------------------------------------------------
log_level = "INFO"           # DEBUG/INFO/WARNING/ERROR；predict 与 update 在 INFO 级别写日志
# log_file = "logs/run.log"  # 取消注释则同时写入文件（相对路径相对本配置文件目录）

# ---- 杂项 ------------------------------------------------------------------
random_seed = 0              # 可复现种子；填负数（如 -1）表示不固定种子

# ---- 动作类别（解码类别数 = 动作数）---------------------------------------
# key 用于在 media_dir 下按 <key>.gif/.mp4 查找素材；label 为屏幕显示的中文名。
actions = [
    { key = "left_hand",  label = "左手握拳" },
    { key = "right_hand", label = "右手握拳" },
    { key = "feet",       label = "双脚背屈" },
    { key = "tongue",     label = "伸舌" },
]

# ---- 解码器额外参数（可选，透传给 decoder_class.from_config）---------------
# 必须置于文件末尾（TOML 表头之后的键都归属该表）。默认空表。
# 示例：
# [decoder_params]
# checkpoint = "models/my_decoder.pt"
# device = "cuda"
